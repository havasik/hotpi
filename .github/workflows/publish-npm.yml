name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Remove token auth to allow OIDC
        run: npm config delete //registry.npmjs.org/:_authToken || true

      - name: Publish @havasik/tui
        run: npm publish --workspace packages/tui --access public --provenance

      - name: Publish @havasik/ai
        run: npm publish --workspace packages/ai --access public --provenance

      - name: Publish @havasik/agent-core
        run: npm publish --workspace packages/agent --access public --provenance

      - name: Publish @havasik/hotpi
        run: npm publish --workspace packages/coding-agent --access public --provenance
